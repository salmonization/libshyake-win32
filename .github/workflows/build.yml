name: build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - msystem: MINGW64
            prefix: mingw-w64-x86_64
            runner: windows-latest
            # pacman deps exist for 64-bit environments
            pacman_deps: mingw-w64-x86_64-mbedtls mingw-w64-x86_64-curl
          # MINGW32 (i686/XP) is not built in CI: MSYS2's stock
          # toolchain is configured --with-arch=pentium4, so its
          # precompiled libgcc/crt/mingwex always contain real SSE2
          # instructions no matter what flags our own sources use.
          # There is no way to pass the CI SSE gate without a
          # custom-built cross toolchain. The XP/i686 line is built
          # and verified locally instead; see docs/XP-BUILD.md.
          - msystem: CLANGARM64
            prefix: mingw-w64-clang-aarch64
            runner: windows-11-arm
            pacman_deps: mingw-w64-clang-aarch64-mbedtls mingw-w64-clang-aarch64-curl
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            git patch tar
            ${{ matrix.prefix }}-cc
            ${{ matrix.prefix }}-cmake
            ${{ matrix.prefix }}-ninja
            ${{ matrix.pacman_deps }}

      - name: pin mbedtls 3.x
        if: matrix.pacman_deps != ''
        run: |
          ver=$(pacman -Q ${{ matrix.prefix }}-mbedtls | awk '{print $2}')
          case "$ver" in
            3.*) echo "mbedtls $ver ok" ;;
            *) echo "::error::mbedtls $ver is not 3.6 LTS"; exit 1 ;;
          esac

      - name: cache deps
        uses: actions/cache@v4
        with:
          path: deps/${{ matrix.msystem }}
          key: deps-${{ matrix.msystem }}-${{ hashFiles('patches/*.patch', 'scripts/*.sh') }}

      - name: build deps from source
        run: |
          if [ ! -f "deps/$MSYSTEM/lib/liboqs.a" ]; then
              ./scripts/build-liboqs.sh
          fi

      - name: configure and build
        run: |
          cmake -G Ninja -B build
          cmake --build build

      - name: run test_crypto
        run: ./build/test_crypto.exe

      - uses: actions/upload-artifact@v4
        with:
          name: libshyake-${{ matrix.msystem }}
          path: |
            build/libshyake.a
            build/shyake.dll
            build/test_crypto.exe
            build/test_e2e.exe
            powershell/Shyake.psm1
            powershell/README.md
